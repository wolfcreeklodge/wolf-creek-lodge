services:
  database:
    image: postgres:16-alpine
    container_name: wcl-database
    restart: unless-stopped
    environment:
      POSTGRES_DB: wolfcreek
      POSTGRES_USER: wolfcreek
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./database/02-email-sync.sql:/docker-entrypoint-initdb.d/02-email-sync.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wolfcreek"]
      interval: 5s
      timeout: 3s
      retries: 5

  website:
    build:
      context: ./website
      dockerfile: Dockerfile
    container_name: wcl-website
    restart: unless-stopped
    ports:
      - "8080:3000"
    environment:
      DATABASE_URL: postgresql://wolfcreek:${POSTGRES_PASSWORD:-changeme_in_production}@database:5432/wolfcreek
      NODE_ENV: production
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID:-common}
      WEBSITE_AUTH_SECRET: ${WEBSITE_AUTH_SECRET:-change_me_website_auth_secret_32ch}
      ADMIN_ALLOWED_EMAILS: ${CRM_ALLOWED_EMAILS:-wolfcreeklodge@outlook.com}
      WEBSITE_REDIRECT_URI: ${WEBSITE_REDIRECT_URI:-https://wolfcreeklodge.us/api/auth/callback}
    depends_on:
      database:
        condition: service_healthy

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: wcl-mcp-server
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      MCP_TRANSPORT: sse
      MCP_PORT: "8081"
      DATABASE_URL: postgresql://wolfcreek:${POSTGRES_PASSWORD:-changeme_in_production}@database:5432/wolfcreek
    depends_on:
      database:
        condition: service_healthy

  crm:
    build:
      context: ./crm
      dockerfile: Dockerfile
    container_name: wcl-crm
    restart: unless-stopped
    ports:
      - "8082:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://wolfcreek:${POSTGRES_PASSWORD:-changeme_in_production}@database:5432/wolfcreek
      CRM_SESSION_SECRET: ${CRM_SESSION_SECRET:-change_me_in_production}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID:-common}
      MICROSOFT_REDIRECT_URI: ${MICROSOFT_REDIRECT_URI:-https://crm.wolfcreeklodge.us/auth/callback}
      CRM_ALLOWED_EMAILS: ${CRM_ALLOWED_EMAILS:-wolfcreeklodge@outlook.com}
      DEV_BYPASS_AUTH: ${DEV_BYPASS_AUTH:-true}
    depends_on:
      database:
        condition: service_healthy

  ical-sync:
    build:
      context: ./scripts
      dockerfile: Dockerfile
    container_name: wcl-ical-sync
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://wolfcreek:${POSTGRES_PASSWORD:-changeme_in_production}@database:5432/wolfcreek
    depends_on:
      database:
        condition: service_healthy

  email-sync:
    build:
      context: ./scripts
      dockerfile: Dockerfile.email-sync
    container_name: wcl-email-sync
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://wolfcreek:${POSTGRES_PASSWORD:-changeme_in_production}@database:5432/wolfcreek
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID:-common}
    depends_on:
      database:
        condition: service_healthy

volumes:
  pgdata:
