version: "3.9"

services:
  database:
    image: postgres:16-alpine
    container_name: wcl-database
    restart: unless-stopped
    environment:
      POSTGRES_DB: wolfcreek
      POSTGRES_USER: wolfcreek
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wolfcreek"]
      interval: 5s
      timeout: 3s
      retries: 5

  website:
    build:
      context: ./website
      dockerfile: Dockerfile
    container_name: wcl-website
    restart: unless-stopped
    ports:
      - "8080:3000"
    environment:
      DATABASE_URL: postgresql://wolfcreek:${POSTGRES_PASSWORD:-changeme_in_production}@database:5432/wolfcreek
      NODE_ENV: production
    depends_on:
      database:
        condition: service_healthy

volumes:
  pgdata:
